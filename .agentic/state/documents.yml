    ●Document Classification  - Instantly identifies document types upon upload, ensuring\
    \ a seamless loan application process and \nsignificantly reducing FTNR (First\
    \ Time Not Right) stage reversals. \n●Fraud Detection  - Scans documents for potential\
    \ fraud and tampering. Detects masked data, blurred images, and data \ninconsistencies\
    \ across multiple pages to ensure complete document integrity. \n●Automated Data\
    \ Entry  - Pre-fills application and collateral fields by extracting data directly\
    \ from uploaded documents, eliminating \nmanual entry and boosting sales team\
    \ productivity. \n●Policy Check  - Validates user and customer-provided data against\
    \ established policy gating rules (from policy document) to ensure \nstrict compliance\
    \ and eligibility. \n●Rejection Notifications & FTNR Flow - Automatically triggers\
    \ notifications for blurred or rejected documents, prompting customers \nto re-upload.\
    \ New uploads are seamlessly integrated into the journey to automatically regenerate\
    \ the updated application form. \n●Document-Driven Scheme Validation  - Cross-references\
    \ uploaded documents against checklist policies to recommend the most \nsuitable\
    \ loan schemes. It also highlights missing documentation, helping users quickly\
    \ determine the best scheme for their specific \nneeds. \n●DIY Intake  - Features\
    \ a customer-facing chat agent that empowers users to independently initiate loan\
    \ applications and inquire about \nTVS products with ease. Sales Agent Confidential\
    \ \nManages intake, checks completeness & collaborates Proprietary \n\n●Fraud\
    \ Detection  - Cross-references sales-submitted documents with API and application\
    \ data to highlight critical inconsistencies, \nsuch as irregular salary credits\
    \ or cash deposits made on national holidays. \n●EMI Detection  - Extracts and\
    \ analyzes EMI payments directly from bank statements to uncover any unreported\
    \ financial obligations. \n●Data Triangulation  - Provides a bird's-eye view comparing\
    \ data across API sources, uploaded documents, and the application form, \nenabling\
    \ users to easily match data points and spot potential fraud. \n●CPV Report Validation\
    \  - Cross-checks reports uploaded by CPV agencies against original questionnaire\
    \ responses to ensure \ncontent accuracy and consistency. \n●Extracts Bank Transactions\
    \ for Credit Analysis - Extracts transaction data from bank statements and presents\
    \ an editable view, \nallowing users to accurately calculate credit metrics like\
    \ limit utilization and BTO \n●Application Scoring & Recommendation - Utilizes\
    \ a configurable, weighted scoring mechanism driven by fraud flags to evaluate\
    \ \nthe application and provide actionable recommendations for next steps. Credit\
    \ Agent Confidential \nAutomates risk assessment Proprietary \n\n●Maker Ops Automation\
    \ - Functions as an automated \"Maker\" by validating operational documents and\
    \ flagging potential issues, \nsuch as missing signatures on application forms.\
    \ This ensures sales teams submit approval-ready documents to Checker Ops, \n\
